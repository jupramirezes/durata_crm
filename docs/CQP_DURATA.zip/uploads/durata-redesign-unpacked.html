<style>
  :root {
    /* Canvas */
    --bg: #FAFAF9;
    --surface: #FFFFFF;
    --surface-2: #F5F5F4;
    --surface-3: #EFEFEC;

    /* Text */
    --text: #0A0A0A;
    --text-2: #404040;
    --text-3: #737373;
    --text-4: #A3A3A3;

    /* Hairlines */
    --line: #E7E5E4;
    --line-2: #EFEFEC;
    --line-strong: #D6D3D1;

    /* Accent — cool steel */
    --accent: oklch(0.52 0.09 240);
    --accent-2: oklch(0.56 0.09 240);
    --accent-weak: oklch(0.96 0.02 240);
    --accent-line: oklch(0.88 0.04 240);

    /* Stage dots — muted, unified chroma */
    --s-lead:     oklch(0.62 0.04 260);
    --s-cotiz:    oklch(0.58 0.08 290);
    --s-enviada:  oklch(0.60 0.09 220);
    --s-seg:      oklch(0.68 0.10 90);
    --s-neg:      oklch(0.62 0.13 50);
    --s-adj:      oklch(0.58 0.10 155);
    --s-recot:    oklch(0.58 0.08 310);
    --s-perd:     oklch(0.58 0.10 28);

    /* Semantic */
    --pos: oklch(0.56 0.10 155);
    --neg: oklch(0.58 0.13 28);
    --warn: oklch(0.66 0.12 75);

    /* Shape */
    --r-sm: 6px;
    --r-md: 8px;
    --r-lg: 10px;
    --r-xl: 14px;

    /* Type */
    --f-sans: 'Inter', system-ui, -apple-system, sans-serif;
    --f-mono: 'IBM Plex Mono', ui-monospace, monospace;
    --f-serif: 'Fraunces', Georgia, serif;

    --shadow-pop: 0 10px 30px -12px rgba(0,0,0,0.18), 0 2px 6px rgba(0,0,0,0.06);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--f-sans); font-size: 13.5px; line-height: 1.45; -webkit-font-smoothing: antialiased; }
  button { font: inherit; color: inherit; background: none; border: 0; cursor: pointer; }
  input, select, textarea { font: inherit; color: inherit; }
  a { color: inherit; text-decoration: none; }
  ::selection { background: var(--accent-weak); }

  .tnum { font-variant-numeric: tabular-nums; }
  .mono { font-family: var(--f-mono); }

  /* Scrollbars — minimal */
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-thumb { background: #D6D3D1; border-radius: 10px; border: 2px solid transparent; background-clip: padding-box; }
  ::-webkit-scrollbar-thumb:hover { background: #A8A29E; background-clip: padding-box; border: 2px solid transparent; }
  ::-webkit-scrollbar-track { background: transparent; }

  /* ── APP SHELL ─────────────────────────────────── */
  .app {
    display: grid;
    grid-template-columns: 232px 1fr;
    min-height: 100vh;
  }

  .sidebar {
    border-right: 1px solid var(--line);
    background: var(--surface);
    display: flex;
    flex-direction: column;
    position: sticky;
    top: 0;
    height: 100vh;
  }

  .brand {
    padding: 20px 20px 18px;
    display: flex;
    align-items: center;
    gap: 10px;
    border-bottom: 1px solid var(--line);
  }
  .brand-mark {
    width: 26px; height: 26px;
    background: var(--text);
    color: var(--surface);
    display: grid; place-items: center;
    font-family: var(--f-mono);
    font-weight: 600;
    font-size: 12px;
    letter-spacing: -0.02em;
    border-radius: 4px;
    position: relative;
  }
  .brand-mark::after {
    content: "";
    position: absolute;
    inset: 2px;
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 2px;
    pointer-events: none;
  }
  .brand-text { line-height: 1.1; }
  .brand-text .n { font-weight: 600; font-size: 14px; letter-spacing: -0.01em; }
  .brand-text .s { font-size: 10.5px; color: var(--text-3); font-family: var(--f-mono); letter-spacing: 0.02em; }

  .nav { padding: 14px 10px; flex: 1; overflow-y: auto; }
  .nav-group { margin-bottom: 18px; }
  .nav-group-label {
    font-family: var(--f-mono);
    font-size: 10px;
    color: var(--text-4);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    padding: 6px 12px 8px;
  }
  .nav-item {
    display: flex; align-items: center; gap: 10px;
    padding: 7px 12px;
    border-radius: var(--r-md);
    color: var(--text-2);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    position: relative;
  }
  .nav-item:hover { background: var(--surface-2); color: var(--text); }
  .nav-item.active { background: var(--surface-2); color: var(--text); }
  .nav-item.active::before {
    content: ""; position: absolute; left: 0; top: 8px; bottom: 8px;
    width: 2px; background: var(--accent); border-radius: 2px;
  }
  .nav-item svg { width: 15px; height: 15px; stroke-width: 1.75; color: var(--text-3); flex-shrink: 0; }
  .nav-item.active svg { color: var(--text); }
  .nav-item .count { margin-left: auto; font-family: var(--f-mono); font-size: 11px; color: var(--text-4); }
  .nav-item.active .count { color: var(--text-3); }

  .sidebar-foot {
    border-top: 1px solid var(--line);
    padding: 12px;
    display: flex; align-items: center; gap: 10px;
  }
  .avatar {
    width: 28px; height: 28px;
    border-radius: 50%;
    background: var(--surface-3);
    color: var(--text);
    display: grid; place-items: center;
    font-size: 11px; font-weight: 600;
    font-family: var(--f-mono);
    border: 1px solid var(--line);
    flex-shrink: 0;
  }
  .avatar.sm { width: 20px; height: 20px; font-size: 9px; }
  .avatar.xs { width: 16px; height: 16px; font-size: 8px; }
  .sidebar-foot .who { flex: 1; min-width: 0; }
  .sidebar-foot .who .n { font-size: 12.5px; font-weight: 600; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .sidebar-foot .who .r { font-size: 11px; color: var(--text-3); }

  /* ── TOPBAR ────────────────────────────────────── */
  .topbar {
    height: 48px;
    border-bottom: 1px solid var(--line);
    padding: 0 24px;
    display: flex; align-items: center; gap: 16px;
    background: var(--surface);
    position: sticky; top: 0; z-index: 10;
  }
  .crumb { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--text-3); }
  .crumb .sep { color: var(--text-4); }
  .crumb .cur { color: var(--text); font-weight: 500; }

  .search {
    flex: 1; max-width: 420px;
    display: flex; align-items: center; gap: 8px;
    padding: 0 12px;
    height: 28px;
    background: var(--surface-2);
    border: 1px solid var(--line);
    border-radius: var(--r-md);
    font-size: 12.5px;
    color: var(--text-3);
  }
  .search svg { width: 13px; height: 13px; }
  .search .kbd { margin-left: auto; font-family: var(--f-mono); font-size: 10.5px; color: var(--text-4); padding: 1px 5px; border: 1px solid var(--line); border-radius: 4px; background: var(--surface); }

  .top-actions { margin-left: auto; display: flex; align-items: center; gap: 8px; }

  /* ── BUTTONS ───────────────────────────────────── */
  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 0 12px; height: 28px;
    border: 1px solid var(--line);
    border-radius: var(--r-md);
    background: var(--surface);
    font-size: 12.5px; font-weight: 500;
    color: var(--text);
    white-space: nowrap;
  }
  .btn:hover { background: var(--surface-2); }
  .btn svg { width: 13px; height: 13px; }
  .btn.primary { background: var(--text); color: var(--surface); border-color: var(--text); }
  .btn.primary:hover { background: #262626; }
  .btn.accent { background: var(--accent); color: #fff; border-color: var(--accent); }
  .btn.accent:hover { background: var(--accent-2); }
  .btn.ghost { border-color: transparent; background: transparent; }
  .btn.ghost:hover { background: var(--surface-2); }
  .btn.sm { height: 24px; padding: 0 9px; font-size: 12px; }
  .btn.icon { padding: 0; width: 28px; justify-content: center; }

  /* ── MAIN ──────────────────────────────────────── */
  .main { display: flex; flex-direction: column; min-width: 0; }
  .page { padding: 24px 32px 60px; max-width: 1440px; width: 100%; }
  .page.wide { max-width: none; padding: 0; }

  .page-head { display: flex; align-items: flex-end; gap: 16px; margin-bottom: 22px; }
  .page-title { font-size: 22px; font-weight: 600; letter-spacing: -0.02em; }
  .page-sub { font-size: 12.5px; color: var(--text-3); font-family: var(--f-mono); }

  /* ── KPI strip ─────────────────────────────────── */
  .kpi-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    border: 1px solid var(--line);
    border-radius: var(--r-lg);
    background: var(--surface);
    overflow: hidden;
  }
  .kpi {
    padding: 18px 20px 20px;
    border-right: 1px solid var(--line);
    position: relative;
  }
  .kpi:last-child { border-right: 0; }
  .kpi-label {
    font-family: var(--f-mono); font-size: 10.5px;
    text-transform: uppercase; letter-spacing: 0.06em;
    color: var(--text-3); margin-bottom: 10px;
    display: flex; align-items: center; gap: 6px;
  }
  .kpi-value {
    font-size: 26px; font-weight: 600; letter-spacing: -0.02em;
    font-variant-numeric: tabular-nums;
    line-height: 1.1;
  }
  .kpi-value .unit { font-size: 14px; color: var(--text-3); font-weight: 500; margin-left: 2px; }
  .kpi-meta { margin-top: 10px; font-size: 11.5px; color: var(--text-3); display: flex; align-items: center; gap: 8px; }
  .kpi-spark { margin-top: 8px; height: 22px; }

  .delta { display: inline-flex; align-items: center; gap: 2px; font-family: var(--f-mono); font-size: 11px; font-weight: 500; }
  .delta.pos { color: var(--pos); }
  .delta.neg { color: var(--neg); }
  .delta.flat { color: var(--text-3); }

  /* ── Section ───────────────────────────────────── */
  .section {
    margin-top: 24px;
    border: 1px solid var(--line);
    border-radius: var(--r-lg);
    background: var(--surface);
    overflow: hidden;
  }
  .section-head {
    display: flex; align-items: center; gap: 10px;
    padding: 14px 18px;
    border-bottom: 1px solid var(--line);
  }
  .section-head h2 { font-size: 13px; font-weight: 600; letter-spacing: -0.01em; }
  .section-head .sub { font-size: 12px; color: var(--text-3); }
  .section-head .spacer { flex: 1; }
  .section-body { padding: 18px; }
  .section-body.tight { padding: 0; }

  /* ── Data table ────────────────────────────────── */
  .tbl { width: 100%; border-collapse: collapse; font-size: 13px; }
  .tbl th {
    text-align: left; font-weight: 500;
    font-family: var(--f-mono); font-size: 10.5px;
    text-transform: uppercase; letter-spacing: 0.06em;
    color: var(--text-3);
    padding: 10px 18px;
    border-bottom: 1px solid var(--line);
    background: var(--surface-2);
    position: sticky; top: 0;
  }
  .tbl td {
    padding: 11px 18px;
    border-bottom: 1px solid var(--line-2);
    vertical-align: middle;
  }
  .tbl tr:last-child td { border-bottom: 0; }
  .tbl tr:hover td { background: var(--surface-2); }
  .tbl td.num, .tbl th.num { text-align: right; font-variant-numeric: tabular-nums; }
  .tbl td.num { font-family: var(--f-mono); }

  /* ── Badge / Stage pill ────────────────────────── */
  .stage-pill {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 2px 8px 2px 6px;
    border: 1px solid var(--line);
    border-radius: 20px;
    font-size: 11.5px;
    font-weight: 500;
    background: var(--surface);
    white-space: nowrap;
  }
  .stage-dot {
    width: 6px; height: 6px; border-radius: 50%;
    flex-shrink: 0;
  }
  .dot-lead { background: var(--s-lead); }
  .dot-cotiz { background: var(--s-cotiz); }
  .dot-enviada { background: var(--s-enviada); }
  .dot-seg { background: var(--s-seg); }
  .dot-neg { background: var(--s-neg); }
  .dot-adj { background: var(--s-adj); }
  .dot-recot { background: var(--s-recot); }
  .dot-perd { background: var(--s-perd); }

  /* ── Pipeline bar ──────────────────────────────── */
  .pipeline-bar {
    display: flex;
    height: 8px;
    border-radius: 20px;
    overflow: hidden;
    background: var(--surface-2);
    margin-bottom: 12px;
  }
  .pipeline-bar > * { transition: flex 200ms; }
  .legend { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px 20px; font-size: 12px; }
  .legend-item { display: flex; align-items: center; gap: 8px; color: var(--text-2); }
  .legend-item .lbl { flex: 1; }
  .legend-item .val { font-family: var(--f-mono); color: var(--text); font-weight: 500; }

  /* ── Alert banner ─────────────────────────────── */
  .alert-banner {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 16px;
    border: 1px solid var(--line);
    background: var(--surface);
    border-radius: var(--r-md);
    margin-bottom: 18px;
    position: relative;
  }
  .alert-banner::before {
    content: ""; position: absolute; left: -1px; top: -1px; bottom: -1px;
    width: 3px; border-radius: var(--r-md) 0 0 var(--r-md);
    background: var(--warn);
  }
  .alert-banner .t { font-weight: 500; font-size: 13px; }
  .alert-banner .d { font-size: 12px; color: var(--text-3); }
  .alert-banner .cta { margin-left: auto; }

  /* ── Avatar group ──────────────────────────────── */
  .avatar-group { display: inline-flex; }
  .avatar-group .avatar { margin-left: -5px; border: 1.5px solid var(--surface); }
  .avatar-group .avatar:first-child { margin-left: 0; }

  /* ── PIPELINE ──────────────────────────────────── */
  .pipeline-shell {
    display: flex;
    flex-direction: column;
    height: calc(100vh - 48px);
    min-height: 0;
  }
  .pipeline-toolbar {
    display: flex; align-items: center; gap: 10px;
    padding: 12px 24px;
    border-bottom: 1px solid var(--line);
    background: var(--surface);
    flex-wrap: wrap;
  }
  .chip {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 0 10px; height: 26px;
    border: 1px solid var(--line);
    border-radius: var(--r-md);
    background: var(--surface);
    font-size: 12px; color: var(--text-2);
    cursor: pointer;
  }
  .chip:hover { background: var(--surface-2); }
  .chip.on { background: var(--text); color: var(--surface); border-color: var(--text); }
  .chip svg { width: 12px; height: 12px; }

  .kanban {
    flex: 1;
    display: flex;
    overflow-x: auto;
    overflow-y: hidden;
    padding: 16px 16px 24px;
    gap: 10px;
    background: var(--bg);
  }
  .col {
    flex: 0 0 280px;
    display: flex;
    flex-direction: column;
    background: transparent;
    min-height: 0;
  }
  .col-head {
    display: flex; align-items: center; gap: 8px;
    padding: 8px 10px;
    margin-bottom: 8px;
  }
  .col-head .name { font-size: 12.5px; font-weight: 600; letter-spacing: -0.005em; }
  .col-head .count { font-family: var(--f-mono); font-size: 11px; color: var(--text-3); background: var(--surface-2); padding: 1px 6px; border-radius: 10px; }
  .col-head .sum { margin-left: auto; font-family: var(--f-mono); font-size: 11px; color: var(--text-3); }
  .col-list { display: flex; flex-direction: column; gap: 6px; overflow-y: auto; padding: 0 2px 8px; }

  .opp-card {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: var(--r-md);
    padding: 10px 12px;
    cursor: pointer;
    transition: all 120ms;
    position: relative;
  }
  .opp-card:hover { border-color: var(--line-strong); box-shadow: 0 2px 6px rgba(0,0,0,0.04); }
  .opp-card .row1 { display: flex; align-items: baseline; gap: 8px; margin-bottom: 2px; }
  .opp-card .company { font-size: 12.5px; font-weight: 600; letter-spacing: -0.005em; flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .opp-card .num { font-family: var(--f-mono); font-size: 10.5px; color: var(--text-4); }
  .opp-card .contact { font-size: 11.5px; color: var(--text-3); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; margin-bottom: 8px; }
  .opp-card .row2 { display: flex; align-items: center; gap: 8px; }
  .opp-card .val { font-family: var(--f-mono); font-size: 12px; font-weight: 600; color: var(--text); flex: 1; }
  .opp-card .spacer { flex: 1; }
  .opp-card .age { font-family: var(--f-mono); font-size: 10.5px; color: var(--text-3); display: inline-flex; align-items: center; gap: 3px; }
  .opp-card .age.warn { color: var(--warn); }
  .opp-card .age.hot { color: var(--neg); }

  /* ── OPP DETAIL ────────────────────────────────── */
  .detail {
    display: grid;
    grid-template-columns: 1fr 320px;
    min-height: calc(100vh - 48px);
  }
  .detail-main { padding: 28px 36px; border-right: 1px solid var(--line); }
  .detail-aside { padding: 24px; background: var(--surface); position: sticky; top: 48px; height: calc(100vh - 48px); overflow-y: auto; }

  .opp-header { display: flex; align-items: flex-start; gap: 16px; margin-bottom: 20px; }
  .opp-title { font-size: 22px; font-weight: 600; letter-spacing: -0.02em; }
  .opp-company-line { display: flex; align-items: center; gap: 8px; color: var(--text-3); font-size: 12.5px; margin-top: 4px; }
  .opp-company-line .sep { color: var(--text-4); }
  .opp-header-actions { margin-left: auto; display: flex; align-items: center; gap: 8px; }

  .meta-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 0; border: 1px solid var(--line); border-radius: var(--r-lg); background: var(--surface); margin-bottom: 24px; }
  .meta-cell { padding: 12px 16px; border-right: 1px solid var(--line); }
  .meta-cell:last-child { border-right: 0; }
  .meta-cell .l { font-family: var(--f-mono); font-size: 10.5px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-3); margin-bottom: 4px; }
  .meta-cell .v { font-size: 14px; font-weight: 600; font-variant-numeric: tabular-nums; letter-spacing: -0.01em; }

  .tabs { display: flex; gap: 4px; border-bottom: 1px solid var(--line); margin-bottom: 18px; }
  .tab {
    padding: 8px 12px;
    font-size: 13px;
    color: var(--text-3);
    font-weight: 500;
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
    cursor: pointer;
  }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--text); border-bottom-color: var(--text); }
  .tab .n { font-family: var(--f-mono); font-size: 11px; color: var(--text-4); margin-left: 4px; }

  /* ── Timeline ──────────────────────────────────── */
  .timeline { position: relative; padding-left: 18px; }
  .timeline::before { content: ""; position: absolute; left: 5px; top: 4px; bottom: 4px; width: 1px; background: var(--line); }
  .tl-item { position: relative; padding-bottom: 16px; }
  .tl-item::before {
    content: ""; position: absolute; left: -17px; top: 4px;
    width: 11px; height: 11px; border-radius: 50%;
    background: var(--surface); border: 2px solid var(--line-strong);
  }
  .tl-item.accent::before { border-color: var(--accent); background: var(--accent-weak); }
  .tl-item.adj::before { border-color: var(--s-adj); }
  .tl-item .hd { display: flex; align-items: center; gap: 8px; font-size: 13px; }
  .tl-item .hd .t { font-weight: 500; }
  .tl-item .hd .time { font-family: var(--f-mono); font-size: 11px; color: var(--text-3); margin-left: auto; }
  .tl-item .body { font-size: 12.5px; color: var(--text-3); margin-top: 3px; padding: 8px 12px; border: 1px solid var(--line); background: var(--surface-2); border-radius: var(--r-md); }

  /* ── Sidebar (detail) ──────────────────────────── */
  .aside-value {
    padding: 16px 16px 18px;
    border: 1px solid var(--line);
    border-radius: var(--r-lg);
    background: var(--surface);
    margin-bottom: 20px;
  }
  .aside-value .l { font-family: var(--f-mono); font-size: 10.5px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-3); margin-bottom: 6px; }
  .aside-value .v { font-size: 26px; font-weight: 600; letter-spacing: -0.02em; font-variant-numeric: tabular-nums; }
  .aside-value .stage { margin-top: 10px; }

  .prop-list { border-top: 1px solid var(--line); }
  .prop-row { display: grid; grid-template-columns: 100px 1fr; padding: 9px 0; border-bottom: 1px solid var(--line-2); align-items: center; font-size: 12.5px; }
  .prop-row .k { color: var(--text-3); font-size: 12px; }
  .prop-row .v { color: var(--text); font-weight: 500; text-align: right; display: flex; align-items: center; gap: 6px; justify-content: flex-end; }
  .aside-h {
    font-family: var(--f-mono); font-size: 10.5px;
    text-transform: uppercase; letter-spacing: 0.06em;
    color: var(--text-3);
    margin: 22px 0 10px;
    display: flex; align-items: center; gap: 8px;
  }

  /* ── Product card ──────────────────────────────── */
  .product-card {
    display: grid;
    grid-template-columns: 96px 1fr auto;
    gap: 16px;
    padding: 14px 16px;
    border: 1px solid var(--line);
    border-radius: var(--r-lg);
    background: var(--surface);
  }
  .product-card + .product-card { margin-top: 8px; }
  .product-thumb {
    width: 96px; height: 72px;
    border-radius: var(--r-md);
    background: var(--surface-2);
    display: grid; place-items: center;
    color: var(--text-4);
    font-family: var(--f-mono); font-size: 9.5px;
    background-image: repeating-linear-gradient(45deg, transparent 0 6px, rgba(0,0,0,0.02) 6px 7px);
    border: 1px solid var(--line);
  }
  .product-card .name { font-size: 13px; font-weight: 600; letter-spacing: -0.005em; }
  .product-card .spec { font-family: var(--f-mono); font-size: 11.5px; color: var(--text-3); margin-top: 2px; }
  .product-card .desc { font-size: 12px; color: var(--text-2); margin-top: 8px; line-height: 1.5; }
  .product-card .price { text-align: right; }
  .product-card .price .p { font-family: var(--f-mono); font-size: 15px; font-weight: 600; font-variant-numeric: tabular-nums; }
  .product-card .price .q { font-family: var(--f-mono); font-size: 11px; color: var(--text-3); margin-top: 2px; }

  /* ── Quote row ─────────────────────────────────── */
  .quote-row {
    display: grid;
    grid-template-columns: 80px 1fr auto auto;
    gap: 16px;
    padding: 12px 16px;
    border: 1px solid var(--line);
    border-radius: var(--r-md);
    background: var(--surface);
    align-items: center;
  }
  .quote-row + .quote-row { margin-top: 6px; }
  .quote-row .num { font-family: var(--f-mono); font-size: 12px; color: var(--text-2); font-weight: 500; }
  .quote-row .meta { font-size: 12px; color: var(--text-3); }
  .quote-row .meta .title { color: var(--text); font-weight: 500; font-family: inherit; font-size: 12.5px; display: block; }
  .quote-row .total { font-family: var(--f-mono); font-size: 13px; font-weight: 600; font-variant-numeric: tabular-nums; }
  .quote-row .actions { display: flex; gap: 4px; }

  /* ── Attachment ────────────────────────────────── */
  .att {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 12px;
    border: 1px solid var(--line);
    border-radius: var(--r-md);
    background: var(--surface);
    font-size: 12.5px;
    cursor: pointer;
  }
  .att + .att { margin-top: 6px; }
  .att:hover { background: var(--surface-2); }
  .att .ext { font-family: var(--f-mono); font-size: 9.5px; color: var(--surface); background: var(--text); padding: 2px 5px; border-radius: 3px; letter-spacing: 0.03em; }
  .att .ext.xlsx { background: var(--s-adj); }
  .att .ext.pdf { background: var(--neg); }
  .att .ext.jpg, .att .ext.png { background: var(--s-enviada); }
  .att .name { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .att .size { font-family: var(--f-mono); font-size: 11px; color: var(--text-3); }

  /* ── Tweaks panel ──────────────────────────────── */
  .tweaks {
    position: fixed; right: 16px; bottom: 16px;
    width: 280px;
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: var(--r-lg);
    box-shadow: var(--shadow-pop);
    z-index: 60;
    overflow: hidden;
  }
  .tweaks-head { padding: 12px 14px; display: flex; align-items: center; gap: 8px; border-bottom: 1px solid var(--line); }
  .tweaks-head .t { font-size: 12px; font-weight: 600; letter-spacing: -0.005em; }
  .tweaks-head .x { margin-left: auto; color: var(--text-3); }
  .tweaks-body { padding: 12px 14px; display: flex; flex-direction: column; gap: 14px; max-height: 60vh; overflow-y: auto; }
  .tweak-row { display: flex; flex-direction: column; gap: 6px; }
  .tweak-row .l { font-family: var(--f-mono); font-size: 10.5px; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.05em; }
  .seg { display: flex; background: var(--surface-2); border: 1px solid var(--line); border-radius: var(--r-md); padding: 2px; gap: 2px; }
  .seg button { flex: 1; padding: 4px 8px; font-size: 11.5px; border-radius: 5px; color: var(--text-3); }
  .seg button.on { background: var(--surface); color: var(--text); box-shadow: 0 1px 2px rgba(0,0,0,0.04); font-weight: 500; }

  .swatches { display: flex; gap: 6px; }
  .sw { width: 22px; height: 22px; border-radius: 6px; cursor: pointer; border: 1px solid var(--line); }
  .sw.on { box-shadow: 0 0 0 2px var(--surface), 0 0 0 3px var(--text); }

  /* Hidden-by-default page slots */
  .page-view { display: none; }
  .page-view.show { display: block; }
  #view-pipeline.show, #view-detail.show { display: flex; flex-direction: column; }

  /* Spark charts */
  .spark-line { stroke: var(--text); stroke-width: 1.5; fill: none; }
  .spark-area { fill: var(--accent-weak); }

  /* Utility */
  .hstack { display: flex; align-items: center; gap: 8px; }
  .vstack { display: flex; flex-direction: column; }
  .muted { color: var(--text-3); }
  .strong { font-weight: 600; }
  .hr { height: 1px; background: var(--line); margin: 16px 0; }

  /* Focus ring */
  button:focus-visible, a:focus-visible, input:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

  /* ─── List pages (Empresas, Cotizaciones, Precios) ─── */
  .list-page { display: flex; flex-direction: column; height: 100%; }
  .list-head { padding: 20px 24px 0 24px; }
  .list-toolbar {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 24px; border-top: 1px solid var(--line); border-bottom: 1px solid var(--line);
    background: var(--surface);
  }
  .list-toolbar .search {
    display: flex; align-items: center; gap: 8px;
    padding: 6px 10px; border: 1px solid var(--line); border-radius: 6px;
    background: var(--surface); min-width: 280px;
  }
  .list-toolbar .search input {
    border: none; outline: none; background: transparent; font: inherit;
    flex: 1; color: var(--text-1);
  }
  .list-toolbar .search svg { width: 14px; height: 14px; color: var(--text-3); }
  .list-scroll { flex: 1; overflow: auto; padding: 0 24px 24px 24px; }
  .list-tbl { width: 100%; border-collapse: collapse; font-size: 12.5px; }
  .list-tbl thead th {
    position: sticky; top: 0; z-index: 1;
    text-align: left; font-weight: 500; padding: 9px 18px 9px 0;
    font-size: 10.5px; text-transform: uppercase; letter-spacing: 0.08em;
    color: var(--text-3); background: var(--surface);
    border-bottom: 1px solid var(--line);
    font-family: var(--f-mono);
  }
  .list-tbl thead th:first-child { padding-left: 4px; }
  .list-tbl tbody td {
    padding: 11px 18px 11px 0; border-bottom: 1px solid var(--line-2, #eceef0);
    color: var(--text-2); vertical-align: middle;
  }
  .list-tbl tbody td:first-child { padding-left: 4px; }
  .list-tbl tbody tr { cursor: pointer; }
  .list-tbl tbody tr:hover { background: var(--hover, #f6f7f8); }
  .primary-cell { color: var(--text-1); font-weight: 500; }
  .sub-cell { color: var(--text-3); font-size: 11px; margin-top: 2px; font-family: var(--f-mono); }
  .num-cell { font-variant-numeric: tabular-nums; font-family: var(--f-mono); }

  .state {
    display: inline-block; padding: 2px 8px; border-radius: 3px;
    font-size: 10.5px; font-family: var(--f-mono); text-transform: uppercase; letter-spacing: 0.06em;
    border: 1px solid var(--line);
  }
  .state-borrador   { color: #7a7f86; background: #f3f4f5; border-color: #e5e7eb; }
  .state-enviada    { color: #1a5fb4; background: #eaf2fb; border-color: #cfe0f5; }
  .state-aprobada   { color: #16744c; background: #e8f5ee; border-color: #cfe8da; }
  .state-rechazada  { color: #9a2a2a; background: #fbeeee; border-color: #f0d4d4; }
  .state-descartada { color: #7a7f86; background: #f3f4f5; border-color: #e5e7eb; text-decoration: line-through; }

  /* ─── Configurador (CPQ) ─── */
  .cfg-shell { display: grid; grid-template-columns: 1fr 360px; gap: 0; height: 100%; }
  .cfg-main { padding: 20px 24px; overflow: auto; border-right: 1px solid var(--line); }
  .cfg-pane { padding: 20px 24px; overflow: auto; background: var(--surface-2, #fafbfc); }
  .cfg-pane-hd {
    font-family: var(--f-mono); font-size: 10.5px; text-transform: uppercase;
    letter-spacing: 0.08em; color: var(--text-3); margin-bottom: 10px;
  }
  .cfg-section { border: 1px solid var(--line); border-radius: 8px; background: var(--surface); margin-bottom: 14px; }
  .cfg-section-head {
    padding: 10px 14px; border-bottom: 1px solid var(--line);
    display: flex; align-items: center; gap: 10px;
    font-weight: 500; font-size: 12.5px;
  }
  .cfg-section-head .step {
    font-family: var(--f-mono); font-size: 10.5px; color: var(--text-3);
    padding: 1px 6px; border: 1px solid var(--line); border-radius: 3px;

  .cfg-section-body { padding: 14px; }
  .cfg-row { display: grid; grid-template-columns: 130px 1fr; gap: 12px; align-items: center; margin-bottom: 10px; }
  .cfg-row:last-child { margin-bottom: 0; }
  .cfg-row > label { font-size: 12px; color: var(--text-2); }
  .cfg-input {
    width: 100%; padding: 6px 10px; border: 1px solid var(--line); border-radius: 6px;
    background: var(--surface); font: inherit; font-family: var(--f-mono); font-size: 12px;
    color: var(--text-1); outline: none;
  }
  .cfg-input:focus { border-color: var(--accent); }
  .cfg-selector { display: flex; gap: 6px; flex-wrap: wrap; }
  .cfg-selector button {
    padding: 5px 10px; border: 1px solid var(--line); border-radius: 6px;
    background: var(--surface); font: inherit; font-size: 12px; cursor: pointer; color: var(--text-2);

  .cfg-selector button.on { border-color: var(--text-1); color: var(--text-1); background: var(--hover, #f6f7f8); }
  .cfg-check { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--text-2); cursor: pointer; }
  .cfg-check input { accent-color: var(--accent); }
  .cfg-box {
    border: 1px solid var(--line); border-radius: 6px; padding: 10px 12px;
    background: var(--surface); font-family: var(--f-mono); font-size: 11.5px;
  }
  .apu-tbl { width: 100%; border-collapse: collapse; font-size: 12px; font-family: var(--f-mono); }

  .apu-tbl th {
    font-weight: 500; font-size: 10.5px; text-transform: uppercase; letter-spacing: 0.06em;

  }
  .apu-tbl .num { text-align: right; font-variant-numeric: tabular-nums; }
  .apu-tbl tfoot td {

  .modal-backdrop {

  .modal-card {
    width: min(640px, 92vw); max-height: 85vh;
    background: var(--surface); border: 1px solid var(--line); border-radius: 10px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.18);
    display: flex; flex-direction: column; overflow: hidden;
  }
  .modal-hd {
    padding: 16px 20px; border-bottom: 1px solid var(--line);
    display: flex; align-items: center; gap: 12px;
  }
  .modal-hd .t { font-size: 15px; font-weight: 500; }
  .modal-hd .x { margin-left: auto; cursor: pointer; color: var(--text-3); padding: 4px; }
  .modal-hd .x:hover { color: var(--text-1); }
  .modal-body { padding: 20px; overflow: auto; flex: 1; }
  .modal-ft {
    padding: 14px 20px; border-top: 1px solid var(--line);
    display: flex; align-items: center; gap: 10px;
  }
  .modal-steps { display: flex; align-items: center; gap: 8px; font-family: var(--f-mono); font-size: 10.5px; }
  .modal-step { color: var(--text-3); }
  .modal-step.on { color: var(--text-1); font-weight: 600; }
  .modal-step.done { color: var(--accent); }
  .modal-step-sep { color: var(--text-3); opacity: 0.5; }
  .modal-list { display: flex; flex-direction: column; border: 1px solid var(--line); border-radius: 6px; max-height: 280px; overflow: auto; }
  .modal-list-item {
    padding: 10px 14px; border-bottom: 1px solid var(--line-2, #eceef0); cursor: pointer;
    display: flex; align-items: center; gap: 10px;
  }
  .modal-list-item:last-child { border-bottom: none; }
  .modal-list-item:hover { background: var(--hover, #f6f7f8); }
  .modal-list-item.on { background: var(--hover, #f6f7f8); }
  .field { margin-bottom: 14px; }
  .field > label {
    display: block; font-size: 11px; font-family: var(--f-mono);
    text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-3); margin-bottom: 5px;
  }
  .field input, .field textarea, .field select {
    width: 100%; padding: 7px 10px; border: 1px solid var(--line); border-radius: 6px;
    background: var(--surface); font: inherit; font-size: 13px; color: var(--text-1); outline: none;
  }
  .field input:focus, .field textarea:focus, .field select:focus { border-color: var(--accent); }

  /* ─── Configuración ─── */
  .cfg-page-grid { display: grid; grid-template-columns: 220px 1fr; gap: 0; height: 100%; }
  .cfg-side-nav {
    border-right: 1px solid var(--line); padding: 20px 14px;
    background: var(--surface-2, #fafbfc);
  }
  .cfg-side-nav .hd {
    font-family: var(--f-mono); font-size: 10.5px; text-transform: uppercase;
    letter-spacing: 0.08em; color: var(--text-3); margin-bottom: 10px; padding: 0 8px;
  }
  .cfg-side-nav .it {
    padding: 7px 10px; border-radius: 6px; cursor: pointer; font-size: 13px; color: var(--text-2);
    margin-bottom: 2px;
  }
  .cfg-side-nav .it:hover { background: var(--hover, #f6f7f8); }
  .cfg-side-nav .it.on { background: var(--hover, #f6f7f8); color: var(--text-1); font-weight: 500; }
</style>
